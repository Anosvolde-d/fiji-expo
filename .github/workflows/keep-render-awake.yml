name: Keep Render app awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: curl -fsS "$RENDER_HEALTH_URL"
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
